<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Focus Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="dashboard">

    <!-- Greeting -->
    <section class="card card--greeting">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="date">Loading date…</div>
      <h1 class="greeting" id="greeting">Hello</h1>

      <div class="name-edit">
        <input type="text" id="nameInput" placeholder="What should we call you?" maxlength="20">
        <button id="saveNameBtn">Save</button>
      </div>
    </section>

    <div class="row">

      <!-- Focus Timer -->
      <section class="card card--timer">
        <h2>Focus Timer</h2>
        <div class="timer-display" id="timerDisplay">25:00</div>

        <div class="timer-controls">
          <button id="startBtn" class="btn btn--primary">Start</button>
          <button id="stopBtn" class="btn btn--muted">Stop</button>
          <button id="resetBtn" class="btn btn--muted">Reset</button>
        </div>

        <div class="timer-settings">
          <label for="durationInput">Session length (minutes)</label>
          <div class="timer-settings__row">
            <input type="number" id="durationInput" min="1" max="180" value="25">
            <button id="setDurationBtn" class="btn btn--ghost">Set</button>
          </div>
        </div>
      </section>

      <!-- Tasks -->
      <section class="card card--tasks">
        <h2>Tasks</h2>

        <form id="taskForm" class="task-form">
          <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="80" autocomplete="off">
          <button type="submit" class="btn btn--primary">Add</button>
        </form>

        <ul class="task-list" id="taskList"></ul>
        <p class="empty-state" id="taskEmptyState">No tasks yet — add your first one above.</p>
      </section>

    </div>

    <!-- Quick Links -->
    <section class="card card--links">
      <h2>Quick Links</h2>

      <form id="linkForm" class="link-form">
        <input type="text" id="linkNameInput" placeholder="Link name" maxlength="20">
        <input type="url" id="linkUrlInput" placeholder="URL (e.g. https://example.com)">
        <button type="submit" class="btn btn--primary">Add Link</button>
      </form>

      <div class="link-list" id="linkList"></div>
    </section>

 </div>

<script src="script.js"></script>

</body>
</html>
